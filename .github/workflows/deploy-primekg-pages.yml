name: Deploy PrimeKG Frontend to Pages

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/deploy-primekg-pages.yml"
      - "primekg_mental_health_project/demo/**"
      - "primekg_mental_health_project/data/reports/**"
      - "primekg_mental_health_project/main.py"
      - "primekg_mental_health_project/src/primekg_mental_health/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare static site
        run: |
          mkdir -p _site
          cp -r primekg_mental_health_project/demo/. _site/
          touch _site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
