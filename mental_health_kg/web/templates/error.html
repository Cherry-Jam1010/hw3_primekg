<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>页面错误</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: linear-gradient(180deg, #f6f8fb 0%, #eef3f8 100%);
            font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
            color: #2c3e50;
        }

        .card {
            width: min(92vw, 560px);
            background: #fff;
            border-radius: 18px;
            padding: 36px 32px;
            box-shadow: 0 18px 50px rgba(44, 62, 80, 0.12);
            text-align: center;
        }

        h1 {
            margin: 0 0 12px;
            font-size: 28px;
        }

        p {
            margin: 0 0 24px;
            line-height: 1.7;
            color: #5d6d7e;
        }

        a {
            display: inline-block;
            padding: 12px 20px;
            border-radius: 999px;
            background: #3498db;
            color: #fff;
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <main class="card">
        <h1>{{ error or '页面出错了' }}</h1>
        <p>这个页面暂时无法正常显示。你可以返回首页，或者检查刚才访问的地址是否正确。</p>
        <a href="/">返回首页</a>
    </main>
</body>
</html>
